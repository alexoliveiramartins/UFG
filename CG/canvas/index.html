<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Trabalho CG Alex Benjamim de Oliveira Martins 202301419</h1>
    <div id="tela">
      <canvas id="canvas" width="550" height="550"></canvas>
    </div>
    <div id="instrucoes">
      <span>W / 8 - Cima</span>
      <span>S / 2 - Baixo</span>
      <span>A / 4 - Esquerda</span>
      <span>D / 6 - Direita</span>
      <span>X / 5 - Limpar tela</span>
    </div>
    <div>
      <span>Referencias:</span>
      <a
        target="_blank"
        rel="noopener"
        href="https://developer.mozilla.org/pt-BR/docs/Web/API/Canvas_API/Tutorial/Basic_usage"
      >
        Canvas tutorial - APIs da Web - MDN - Mozilla
      </a>
    </div>
  </body>

  <script>
    let canvas = document.getElementById("canvas");
    let ctx = canvas.getContext("2d");
    ctx.fillStyle = "#0";

    let x_pos = 275;
    let y_pos = 275;
    ctx.fillRect(x_pos, y_pos, 8, 8);

    const paint_rect = () => ctx.fillRect(x_pos, y_pos, 8, 8);
    const clear_canvas = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

    document.addEventListener("keydown", (e) => {
      if (e.key === "d") {
        x_pos += 4;
        paint_rect();
      } else if (e.key === "a" || e.key === "A" || e.key === "4") {
        x_pos -= 4;
        paint_rect();
      } else if (e.key === "D" || e.key === "d" || e.key === "6") {
        x_pos += 4;
        paint_rect();
      } else if (e.key === "w" || e.key === "W" || e.key === "8") {
        y_pos -= 4;
        paint_rect();
      } else if (e.key === "x" || e.key === "X" || e.key === "2") {
        y_pos += 4;
        paint_rect();
      } else if (e.key === "s" || e.key === "S" || e.key === "5") {
        clear_canvas();
      } else if (e.key === "Escape") {
        alert("Exiting game");
        window.open("", "_self", "").close();
      }
    });
  </script>
</html>

<!-- 
8 e w/W - move para cimaXX
 2 e x/X - move para baixo
 4 e a/A - move para esquerda
 6 e d/D - move para direita
 5 e s/S - limpa o desenho (pinta de branco a tela)
 ESC - encerra a aplicação.
-->
